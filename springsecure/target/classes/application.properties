# TLS is terminated at Apache/Nginx reverse proxy
server.ssl.enabled=${SERVER_SSL_ENABLED:false}

# MongoDB (set MONGODB_URI as environment variable in EC2)
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=${MONGODB_DATABASE:arepDB}

# Allowed origin for Apache static client
app.cors.allowed-origin=${APP_CORS_ALLOWED_ORIGIN:https://apache.tudominio.com}