<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Client - Apache</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Secure Client (Apache)</h1>
      <p class="description">
        Cliente HTML + JS servido en Apache. Consume servicios REST de Spring Boot por HTTPS.
      </p>

      <section class="card">
        <h2>Configuración actual</h2>
        <div class="row">
          <span>Spring API base URL:</span>
          <code id="apiBase"></code>
        </div>
      </section>

      <section class="card">
        <h2>Prueba de conexión REST</h2>
        <button id="pingBtn" type="button">Consultar endpoint /</button>
        <pre id="pingResult" class="result">Sin ejecución.</pre>
      </section>

      <section class="card">
        <h2>Login (preparado para endpoint seguro)</h2>
        <form id="loginForm">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required />

          <label for="password">Contraseña</label>
          <input id="password" name="password" type="password" required />

          <button type="submit">Iniciar sesión</button>
        </form>
        <pre id="loginResult" class="result">Sin ejecución.</pre>
      </section>
    </main>

    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
